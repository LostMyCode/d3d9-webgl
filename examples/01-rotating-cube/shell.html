<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3D9 to WebGL Wrapper PoC</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            margin-bottom: 10px;
            color: #4CAF50;
        }
        
        .info {
            margin-bottom: 20px;
            padding: 10px;
            background-color: #2a2a2a;
            border-radius: 5px;
            max-width: 800px;
        }
        
        #canvas {
            border: 2px solid #4CAF50;
            background-color: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #output {
            margin-top: 20px;
            padding: 10px;
            background-color: #2a2a2a;
            border-radius: 5px;
            max-width: 800px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .status {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: #000;
            border-radius: 3px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>D3D9 to WebGL Wrapper - Proof of Concept</h1>
    
    <div class="info">
        <p><strong>Goal:</strong> Demonstrate that Direct3D 9 API calls can be translated to WebGL</p>
        <p><strong>Test:</strong> Drawing a colored triangle using <code>DrawPrimitiveUP</code></p>
        <p><strong>Expected Result:</strong> A triangle with red (top), green (right), and blue (left) vertices</p>
    </div>
    
    <canvas id="canvas" width="800" height="600"></canvas>
    
    <div class="status">Initializing...</div>
    
    <div id="output"></div>
    
    <script type="text/javascript">
        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                var element = document.getElementById('output');
                if (element) element.value = ''; // clear browser cache
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                    if (element) {
                        element.innerHTML += text + "\n";
                        element.scrollTop = element.scrollHeight; // focus on bottom
                    }
                };
            })(),
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
            },
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function(e) {
                    alert('WebGL context lost. You will need to reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function(text) {
                var statusElement = document.querySelector('.status');
                if (statusElement) {
                    if (text) {
                        statusElement.textContent = text;
                        statusElement.style.backgroundColor = '#4CAF50';
                    } else {
                        statusElement.textContent = 'Running';
                        statusElement.style.backgroundColor = '#2196F3';
                    }
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };
        Module.setStatus('Downloading...');
        window.onerror = function() {
            Module.setStatus('Exception thrown, see JavaScript console');
            Module.setStatus = function(text) {
                if (text) Module.printErr('[post-exception status] ' + text);
            };
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
